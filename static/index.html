<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网聊天室</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>局域网聊天室</h1>
            <input type="text" id="username-input" placeholder="输入昵称..." maxlength="20">
            <button id="join-btn">加入聊天</button>
        </div>
    </div>

    <div id="chat-screen" style="display: none;">
        <div class="sidebar">
            <h2>在线用户</h2>
            <ul id="user-list"></ul>
        </div>
        <div class="main">
            <div class="header">
                <h2>公共聊天室</h2>
                <span id="online-count">0 人在线</span>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-area">
                <div class="toolbar">
                    <button id="emoji-btn" title="表情">😀</button>
                    <button id="image-btn" title="发送图片">🖼️</button>
                    <button id="file-btn" title="发送文件">📎</button>
                    <input type="file" id="image-input" accept="image/*" style="display: none;">
                    <input type="file" id="file-input" style="display: none;">
                </div>
                <div class="input-row">
                    <textarea id="message-input" placeholder="输入消息... (使用 @deepseek 提问AI)" rows="2"></textarea>
                    <button id="send-btn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div id="emoji-picker" class="emoji-picker" style="display: none;">
        <div class="emoji-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
